
name: IDOL TREND WATCH Daily

on:
  schedule:
    # 毎日 22:00 UTC = 翌朝 7:00 JST
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install video dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk
          pip install --quiet pillow

      - name: Run IDOL TREND WATCH
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python idol_trend_watch.py

      - name: Generate daily video
        run: python make_video.py

      - name: Upload to Google Drive
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: python upload_to_drive.py

      - name: Commit outputs and state
        run: |
          git config user.name "cm-trend-watch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add outputs data
          git diff --cached --quiet || git commit -m "daily: $(date -u -d '+9 hours' +%Y-%m-%d)"
          git pull --rebase -X theirs origin main
          git push
